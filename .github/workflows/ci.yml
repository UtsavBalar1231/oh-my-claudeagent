name: CI

permissions: {}

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Run validation suites
        run: bash scripts/validate-plugin.sh --check claims --check hooks

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install ruff
        run: uv tool install ruff

      - name: Check formatting
        run: ruff format --check servers/

      - name: Lint
        run: ruff check servers/

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: ShellCheck
        run: shellcheck scripts/*.sh

  test-bats:
    name: BATS Hook Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          submodules: true

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Pre-warm omca MCP venv
        run: uv sync --project servers

      - name: Install ast-grep CLI
        run: uv tool install ast-grep-cli

      - name: Run BATS behavioral tests
        run: tests/bats/bats-core/bin/bats tests/bats/hooks/

  test-pytest:
    name: pytest MCP Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install test dependencies
        run: uv sync --project servers --group dev

      # The startup-latency and signal-shutdown tests spawn the real omca MCP
      # server, whose entry point calls discover_binary() and exits 1 if ast-grep
      # is absent — so the server must have ast-grep on PATH to reply to initialize.
      - name: Install ast-grep CLI
        run: uv tool install ast-grep-cli

      - name: Run pytest
        run: uv run --project servers pytest servers/tests/ -v --tb=short
