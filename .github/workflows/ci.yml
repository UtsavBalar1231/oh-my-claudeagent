name: CI

permissions: {}

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run validation suites
        run: bash scripts/validate-plugin.sh --check claims --check hooks

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v7

      - name: Install ruff
        run: uv tool install ruff

      - name: Check formatting
        run: ruff format --check servers/

      - name: Lint
        run: ruff check servers/

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: ShellCheck
        run: shellcheck scripts/*.sh

  test-bats:
    name: BATS Hook Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: true

      - uses: astral-sh/setup-uv@v7

      - name: Pre-warm omca MCP venv
        run: uv sync --project servers

      - name: Install ast-grep CLI
        run: uv tool install ast-grep-cli

      - name: Run BATS behavioral tests
        run: tests/bats/bats-core/bin/bats tests/bats/hooks/

  test-pytest:
    name: pytest MCP Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Install test dependencies
        run: uv sync --project servers --group dev

      - name: Run pytest
        run: uv run --project servers pytest servers/tests/ -v --tb=short
