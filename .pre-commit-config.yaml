ci:
  autofix_commit_msg: "ci: auto-fix from pre-commit hooks"
  autofix_prs: true
  autoupdate_commit_msg: "ci: pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: [zizmor]

repos:
  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        # Bats test files carry `#!/usr/bin/env bats` shebangs by convention
        # but are invoked via `bats file.bats` / `just test-bats`, not run
        # directly. All existing bats files follow this pattern.
        exclude: '\.bats$'

  # Shell
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        # Scope shellcheck to match `just lint-shell`, which only lints
        # scripts/*.sh. Bats files use shell-like syntax but follow test-file
        # style conventions (unbraced vars are idiomatic) that SC2250 flags
        # noisily. Linting bats is out of scope for this project's lint
        # boundary — see justfile `lint-shell` recipe.
        exclude: '\.bats$'

  # Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]

  # GHA workflow validation
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-github-workflows

  # GHA security scanning
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor
